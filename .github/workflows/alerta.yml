name: Practica 4 - Alerta de Integracion Continua

on:
  push:
    branches: [ "main" ]

jobs:
  notificar:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar el codigo del repositorio
        uses: actions/checkout@v4

      - name: Ejecutar el programa Hola Mundo
        run: node index.js

      - name: Enviar notificacion automatica a ntfy
        run: |
          curl -d "¡Integración Continua Exitosa! Fernando Molina (2024-1379) ha subido código a main." https://ntfy.sh/devops-itla
